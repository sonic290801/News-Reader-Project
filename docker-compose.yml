services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: newsreader
      POSTGRES_PASSWORD: newsreader
      POSTGRES_DB: newsreader
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U newsreader"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - .env.local
    environment:
      DATABASE_URL: postgresql://newsreader:newsreader@db:5432/newsreader
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
